body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a2b4a;min-height:100vh}
.app{max-width:700px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 24px rgba(0,0,0,.1)}
.header{padding:14px 16px 0;border-bottom:1px solid #dde3ed;background:#fff;position:sticky;top:0;z-index:10}

.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;font-size:13px;border:none;background:none;cursor:pointer;color:#7a90b0;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit;font-weight:500}
.tab.active{color:#1a2b4a;border-bottom-color:#2563eb;font-weight:700}
.tab:hover:not(.active){color:#1a2b4a}
.content{flex:1;overflow-y:auto;padding:16px}
.card{background:#fff;border:1px solid #dde3ed;border-radius:12px;padding:14px;margin-bottom:10px}
.btn{padding:8px 14px;border-radius:8px;border:1px solid #c8d4e4;background:transparent;color:#1a2b4a;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#f0f2f5}
.btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
.btn.primary:hover{background:#1d4ed8}
.btn.danger{background:#dc2626;border-color:#dc2626;color:#fff}
.btn.danger:hover{background:#b91c1c}
.btn.success{background:#16a34a;border-color:#16a34a;color:#fff}
.btn.success:hover{background:#15803d}
.btn.sm{padding:4px 9px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
input[type=text],input[type=password],input[type=datetime-local]{width:100%;padding:9px 12px;border:1px solid #c8d4e4;border-radius:8px;background:#f8fafc;color:#1a2b4a;font-size:14px;outline:none;font-family:inherit}
input::placeholder{color:#9ab0c8}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.group-title{font-size:12px;font-weight:700;color:#1d4ed8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding:5px 10px;background:#eff6ff;border-radius:6px;display:inline-block;border:1px solid #bfdbfe}
.match-card{border:1px solid #dde3ed;border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff}
.match-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.match-date{font-size:11px;color:#7a90b0}
.rbadge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700}
.rbadge.correct{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.rbadge.wrong{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.rbadge.pending{background:#f1f5f9;color:#94a3b8;border:1px solid #dde3ed}
.rbadge.saved{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}

.team-btn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid #dde3ed;background:#f8fafc;cursor:pointer;transition:all .2s;text-align:center;min-width:0;font-family:inherit}
.team-btn:hover:not(:disabled){border-color:#2563eb;background:#eff6ff}
.team-btn.sel{border-color:#16a34a;background:#f0fdf4}
.team-btn:disabled{cursor:not-allowed;opacity:.9}
.flag-img{width:42px;height:28px;object-fit:cover;border-radius:4px;display:block;margin:0 auto 6px;border:1px solid #dde3ed}
.tname{font-size:12px;color:#1a2b4a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}

.draw-btn:hover:not(:disabled){border-color:#d97706;color:#d97706;background:#fffbeb}
.draw-btn.sel{border-color:#d97706;background:#fffbeb;color:#d97706}

  const m={'11 Jun':111,'12 Jun':112,'13 Jun':113,'14 Jun':114,'15 Jun':115,
           '16 Jun':116,'17 Jun':117,'18 Jun':118,'19 Jun':119,'20 Jun':120,

function calcPts(picks,results){
  let p=0;
  Object.keys(picks).forEach(id=>{if(results[id]&&picks[id]===results[id])p+=3;});
  return p;
}
function calcPlPts(plPicks,bracket){
  let p=0;
  if(!bracket)return p;
  PL_ROUNDS.forEach(rd=>{
    const data=bracket[rd.key]||[];
    data.forEach((m,i)=>{
      const key=rd.key+'_'+i;
      const pick=plPicks[key];
      if(!pick||!m.w)return;
      if((pick==='t1'&&m.w===m.t1)||(pick==='t2'&&m.w===m.t2))p+=3;
    });
  });
  return p;
}
function calcSpecialPts(sp,sr){
  let p=0;
  if(!sp||!sr)return p;
  if(sr.goleador&&sp.goleador===sr.goleador)p+=10;
  if(sr.campeon&&sp.campeon===sr.campeon)p+=10;
  else if(sr.segundo&&sp.campeon===sr.segundo)p+=5;
  return p;
}
function pastDL(){return new Date()>new Date(DL_GRUPOS);}

// === DOM ===
function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='cls')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='disabled'){if(v)e.disabled=true;}
    else if(k==='value'&&(tag==='input'||tag==='select'))e.value=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(9)){
    if(c==null||c===false)continue;
    e.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return e;
}

// ===== LOGIN =====
function buildLogin(){
  let mode='login',uv='',pv='',err='';
  const wrap=el('div',{cls:'login-wrap'});
  const card=el('div',{cls:'login-card'});
  wrap.appendChild(card);
  function draw(){
    card.innerHTML='';
    card.appendChild(el('div',{style:{fontSize:'40px',textAlign:'center',marginBottom:'8px'}},'⚽'));
    card.appendChild(el('div',{style:{fontSize:'22px',fontWeight:'700',textAlign:'center',marginBottom:'3px',color:'#fff'}},'Prode Mundial 2026'));
    card.appendChild(el('div',{style:{fontSize:'12px',color:'#5a7399',textAlign:'center',marginBottom:'22px'}},mode==='login'?'Ingresá a tu cuenta':'Creá tu cuenta'));
    const ui=el('input',{type:'text',placeholder:'usuario',value:uv});ui.oninput=e=>uv=e.target.value;
    const pi=el('input',{type:'password',placeholder:'contraseña',value:pv});pi.oninput=e=>pv=e.target.value;
    card.appendChild(el('div',{cls:'form-group'},el('label',{cls:'form-label'},'Usuario'),ui));
    card.appendChild(el('div',{cls:'form-group'},el('label',{cls:'form-label'},'Contraseña'),pi));
    if(err)card.appendChild(el('div',{cls:'err'},err));
    const sb=el('button',{cls:'btn primary',style:{width:'100%',marginTop:'8px'}},mode==='login'?'Ingresar':'Registrarme');
    sb.onclick=async()=>{
      err='';
      if(!uv.trim()||!pv.trim()){err='Completá todos los campos';draw();return;}
      sb.disabled=true;sb.textContent='Cargando...';
      if(uv.trim()===ADMIN_USER&&pv===ADMIN_PASS){
        await fbGetDeadlines();
        const[results,allUsers,allPicks,bracket]=await Promise.all([fbGetResults(),fbGetAllUsers(),fbGetAllPicks(),fbGetBracket()]);
        setState({user:{username:'admin',isAdmin:true},tab:'home',results,allUsers,allPicks,bracket,picks:{}});
        return;
      }
      const ud=await fbGetUser(uv.trim());
      if(mode==='login'){
        if(!ud){err='Usuario no encontrado';draw();return;}
        if(ud.password!==pv){err='Contraseña incorrecta';draw();return;}
        await fbGetDeadlines();
        const[picks,results,plPicks,specialPicks,specialResults]=await Promise.all([fbGetPicks(uv.trim()),fbGetResults(),fbGetPlPicks(uv.trim()),fbGetSpecialPicks(uv.trim()),fbGetSpecialResults()]);
        setState({user:{username:uv.trim(),isAdmin:false},tab:'home',picks,results,plPicks,specialPicks,specialResults});
      }else{
        if(ud){err='Ese usuario ya existe';draw();return;}
        if(pv.length<4){err='Mínimo 4 caracteres';draw();return;}
        await fbSetUser(uv.trim(),pv);
        await fbGetDeadlines();
        const[results,plPicks,specialResults]=await Promise.all([fbGetResults(),fbGetPlPicks(uv.trim()),fbGetSpecialResults()]);
        setState({user:{username:uv.trim(),isAdmin:false},tab:'home',picks:{},results,plPicks:{},specialPicks:{},specialResults});
      }
    };
    card.appendChild(sb);
    const tgl=el('div',{cls:'toggle-link'},mode==='login'?'¿No tenés cuenta? Registrate':'¿Ya tenés cuenta? Ingresá');
    tgl.onclick=()=>{mode=mode==='login'?'register':'login';err='';draw();};
    card.appendChild(tgl);
    [ui,pi].forEach(i=>i.onkeydown=e=>{if(e.key==='Enter')sb.click();});
  }
  draw();
  return wrap;
}

function buildApp(){

  const TABS=S.user.isAdmin

    :[{id:'home',l:'🏠 Inicio'},{id:'grupos',l:'⚽ Grupos'},{id:'playoff',l:'🏆 Playoffs'},{id:'tabla',l:'📊 Tabla'}];
  const tabsEl=el('div',{cls:'tabs'});
  TABS.forEach(t=>{
    const b=el('button',{cls:'tab'+(S.tab===t.id?' active':'')},t.l);
    b.onclick=async()=>{
      if(S.tab===t.id)return;
      await fbGetDeadlines();
      const results=await fbGetResults();
      if(t.id==='tabla'||t.id==='admin'){
        const[allUsers,allPicks,allPlPicks,bracket,allSpecialPicks,specialResults]=await Promise.all([fbGetAllUsers(),fbGetAllPicks(),fbGetAllPlPicks(),fbGetBracket(),fbGetAllSpecialPicks(),fbGetSpecialResults()]);
        setState({tab:t.id,results,allUsers,allPicks,allPlPicks,bracket,allSpecialPicks,specialResults});
      }else if(t.id==='playoff'){
        const[bracket,plPicks]=await Promise.all([fbGetBracket(),fbGetPlPicks(S.user.username)]);
        setState({tab:t.id,results,bracket,plPicks});
      }else if(t.id==='home'){
        const[results,specialPicks,specialResults]=await Promise.all([fbGetResults(),fbGetSpecialPicks(S.user.username),fbGetSpecialResults()]);
        setState({tab:t.id,results,specialPicks,specialResults});
      }else{
        setState({tab:t.id,results});
      }
    };
    tabsEl.appendChild(b);
  });
  hdr.appendChild(tabsEl);
  wrap.appendChild(hdr);
  const content=el('div',{cls:'content'});
  if(S.tab==='home')content.appendChild(buildHome());
  else if(S.tab==='grupos')content.appendChild(buildGrupos());
  else if(S.tab==='playoff')content.appendChild(buildPlayoff());
  else if(S.tab==='tabla')content.appendChild(buildTabla());
  else if(S.tab==='admin')content.appendChild(buildAdmin());
  wrap.appendChild(content);
  return wrap;
}

// ===== GRUPOS =====
function buildGrupos(){
  const div=el('div',null);
  const past=pastDL();
  if(past)div.appendChild(el('div',{cls:'alert info'},'🔒 Predicciones de grupos cerradas.'));
  let activeG='A';
  const GS=['A','B','C','D','E','F','G','H','I','J','K','L'];
  const filterRow=el('div',{cls:'filter-row'});
  const cont=el('div',null);

  function buildCards(){
    cont.innerHTML='';
    if(activeG==='A'&&false){} // placeholder
    const filtered=MATCHES.filter(m=>m.g===activeG).sort((a,b)=>matchDay(a.d)-matchDay(b.d));
    cont.appendChild(el('div',{cls:'group-title',style:{marginBottom:'10px'}},'Grupo '+activeG));
    filtered.forEach(m=>{
      const p=S.picks[m.id];
      const r=S.results[m.id];
      const hasR=r&&r!=='';
      const locked=!!p||past||hasR;
      const ok=hasR&&p===r, bad=hasR&&p&&p!==r;
      let bc='pending',bt='Sin elegir';
      if(ok){bc='correct';bt='✓ Correcto +3pts';}
      else if(bad){bc='wrong';bt='✗ Incorrecto';}
      else if(hasR&&!p){bc='pending';bt='🔒 Cerrado';}
      else if(p){bc='saved';bt='✓ Guardado';}
      const card=el('div',{cls:'match-card'});
      card.appendChild(el('div',{cls:'match-meta'},el('span',{cls:'match-date'},m.d),el('span',{cls:'rbadge '+bc},bt)));
      const teams=el('div',{cls:'match-teams'});
      const hb=el('button',{cls:'team-btn'+(p==='home'?' sel':''),disabled:locked});
      hb.appendChild(mkFlag(m.h));hb.appendChild(el('span',{cls:'tname'},m.h));
      hb.onclick=async()=>await pick(m.id,'home');
      const vc=el('div',{cls:'vs-col'},el('span',{cls:'vs-lbl'},'VS'));
      const db=el('button',{cls:'draw-btn'+(p==='draw'?' sel':''),disabled:locked},'Empate');
      db.onclick=async()=>await pick(m.id,'draw');
      vc.appendChild(db);
      const ab=el('button',{cls:'team-btn'+(p==='away'?' sel':''),disabled:locked});
      ab.appendChild(mkFlag(m.a));ab.appendChild(el('span',{cls:'tname'},m.a));
      ab.onclick=async()=>await pick(m.id,'away');
      teams.appendChild(hb);teams.appendChild(vc);teams.appendChild(ab);
      card.appendChild(teams);
      cont.appendChild(card);
    });
  }

  async function pick(matchId,choice){
    if(S.picks[matchId]||past||S.results[matchId])return;
    S.picks={...S.picks,[matchId]:choice};
    buildCards();
    await fbSetPicks(S.user.username,S.picks);
  }

  GS.forEach(g=>{
    const b=el('button',{cls:'filter-btn'+(activeG===g?' active':'')},g);
    b.onclick=()=>{activeG=g;filterRow.querySelectorAll('.filter-btn').forEach((x,i)=>x.className='filter-btn'+(GS[i]===g?' active':''));buildCards();};
    filterRow.appendChild(b);
  });
  div.appendChild(filterRow);
  buildCards();
  div.appendChild(cont);
  return div;
}

    )
  ));

  let activeR='r16';
  const filterRow=el('div',{cls:'filter-row'});
  const cont=el('div',null);

  function buildPLCards(){
    cont.innerHTML='';
    const rd=PL_ROUNDS.find(r=>r.key===activeR);

    cont.appendChild(rdHeader);

    for(let i=0;i<rd.n;i++){
      const m=data[i]||{t1:'',t2:'',w:''};
      const pickKey=activeR+'_'+i;
      const p=plPicks[pickKey]; // 't1' or 't2'
      const r=m.w; // result set by admin
      const hasR=r&&r!=='';
      // locked if: already picked, past deadline, or admin set result, or teams not defined
      const pastThisRound=new Date()>new Date(DL_PL[activeR]||DL_PL.r16);
      const locked=!!p||pastThisRound||hasR||(!m.t1&&!m.t2);

      const ok=hasR&&((p==='t1'&&r===m.t1)||(p==='t2'&&r===m.t2));
      const bad=hasR&&p&&!ok;

      let bc='pending', bt='Sin elegir';
      if(ok){bc='correct';bt='✓ Correcto +3pts';}
      else if(bad){bc='wrong';bt='✗ Incorrecto';}
      else if(hasR&&!p){bc='pending';bt='🔒 Cerrado';}
      else if(p){bc='saved';bt='✓ Guardado';}
      else if(!m.t1&&!m.t2){bc='pending';bt='Equipos por definir';}

      const card=el('div',{cls:'match-card'});
      card.appendChild(el('div',{cls:'match-meta'},
        el('span',{cls:'match-date'},'Partido '+(i+1)),
        el('span',{cls:'rbadge '+bc},bt)
      ));

      const teams=el('div',{cls:'match-teams'});

      // T1 button
      const t1b=el('button',{cls:'team-btn'+(p==='t1'?' sel':''),disabled:locked});
      t1b.appendChild(el('span',{style:{fontSize:'15px',fontWeight:'700',color:(p==='t1'||(ok&&r===m.t1))?'#15803d':m.t1?'#1a2b4a':'#94a3b8',display:'block',marginBottom:'4px'}},m.t1||'Por definir'));
      t1b.onclick=async()=>{
        if(!!p||new Date()>new Date(DL_PL[activeR]||DL_PL.r16)||hasR||!m.t1)return;
        plPicks[pickKey]='t1';
        buildPLCards();
        await fbSetPlPicks(S.user.username,plPicks);
      };

      // VS
      const vc=el('div',{cls:'vs-col'},el('span',{cls:'vs-lbl'},'VS'));

      // T2 button
      const t2b=el('button',{cls:'team-btn'+(p==='t2'?' sel':''),disabled:locked});
      t2b.appendChild(el('span',{style:{fontSize:'15px',fontWeight:'700',color:(p==='t2'||(ok&&r===m.t2))?'#15803d':m.t2?'#1a2b4a':'#94a3b8',display:'block',marginBottom:'4px'}},m.t2||'Por definir'));
      t2b.onclick=async()=>{
        if(!!p||new Date()>new Date(DL_PL[activeR]||DL_PL.r16)||hasR||!m.t2)return;
        plPicks[pickKey]='t2';
        buildPLCards();
        await fbSetPlPicks(S.user.username,plPicks);
      };

      teams.appendChild(t1b); teams.appendChild(vc); teams.appendChild(t2b);
      card.appendChild(teams);
      cont.appendChild(card);
    }

    // Champion card
    if(activeR==='final'&&bk.champion){
      cont.appendChild(el('div',{cls:'champ-card'},
        el('div',{style:{fontSize:'32px'}},'🏆'),
        el('div',{style:{fontSize:'20px',fontWeight:'700',color:'#fbbf24',marginTop:'8px'}},bk.champion),
        el('div',{style:{fontSize:'12px',color:'#5a7399',marginTop:'4px'}},'Campeón Mundial 2026')
      ));
    }
  }

  PL_ROUNDS.forEach(rd=>{
    const b=el('button',{cls:'filter-btn'+(activeR===rd.key?' active':'')},rd.label);
    b.onclick=()=>{
      activeR=rd.key;
      filterRow.querySelectorAll('.filter-btn').forEach((x,i)=>x.className='filter-btn'+(PL_ROUNDS[i].key===rd.key?' active':''));
      buildPLCards();
    };
    filterRow.appendChild(b);
  });

  div.appendChild(filterRow);
  buildPLCards();
  div.appendChild(cont);
  return div;
}

// ===== TABLA =====
function buildTabla(){
  const div=el('div',null);
  let sortBy='total'; // 'total' | 'grupos' | 'playoff'

  const players=Object.keys(S.allUsers).map(u=>{
    const gPts=calcPts(S.allPicks[u]||{},S.results);
    const plPts=calcPlPts(S.allPlPicks[u]||{},S.bracket);
    const spPts=calcSpecialPts(S.allSpecialPicks[u]||{},S.specialResults||{});
    return {u,total:gPts+plPts+spPts,gPts,plPts,spPts,pred:Object.keys(S.allPicks[u]||{}).length};
  });

  if(!players.length){
    div.appendChild(el('div',{cls:'sec-title'},'0 participantes'));
    div.appendChild(el('div',{cls:'card',style:{textAlign:'center',color:'#5a7399',padding:'24px'}},'Todavía no hay participantes.'));
    return div;
  }

  // Header con botones de ordenamiento
  const hdr=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px',padding:'0 2px'}});
  hdr.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'700',color:'#5a7399',textTransform:'uppercase',letterSpacing:'.08em',flex:'1'}},'Participantes — '+players.length));

  function mkSortBtn(label,key,color){
    const b=document.createElement('button');
    b.style.cssText='padding:4px 10px;border-radius:20px;border:1px solid #1a2540;background:transparent;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;color:'+color+';display:flex;align-items:center;gap:3px';
    function upd(){
      if(sortBy===key){b.style.background=color;b.style.color='#fff';b.style.borderColor=color;}
      else{b.style.background='transparent';b.style.color=color;b.style.borderColor='#1a2540';}
    }
    b.innerHTML=label+'<span style="font-size:10px">'+(sortBy===key?'▼':'⇅')+'</span>';
    b.onclick=()=>{sortBy=key;buildRows();sortBtns.forEach(x=>x());};
    const refresh=()=>{
      b.innerHTML=label+'<span style="font-size:10px;margin-left:2px">'+(sortBy===key?'▼':'⇅')+'</span>';
      upd();
    };
    upd();
    return{btn:b,refresh};
  }

  const s1=mkSortBtn('Total','total','#7db8f7');
  const s2=mkSortBtn('Grupos','grupos','#4ade80');
  const s3=mkSortBtn('Playoffs','playoff','#fbbf24');
  const sortBtns=[s1.refresh,s2.refresh,s3.refresh];
  hdr.appendChild(s1.btn);hdr.appendChild(s2.btn);hdr.appendChild(s3.btn);
  div.appendChild(hdr);

  const listEl=el('div',null);
  div.appendChild(listEl);

  function buildRows(){
    listEl.innerHTML='';
    const sorted=[...players].sort((a,b)=>{
      if(sortBy==='grupos')return b.gPts-a.gPts||b.total-a.total;
      if(sortBy==='playoff')return b.plPts-a.plPts||b.total-a.total;
      return b.total-a.total||b.pred-a.pred;
    });
    sorted.forEach(({u,total,gPts,plPts,pred},i)=>{
      const icon=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
      const mainPts=sortBy==='grupos'?gPts:sortBy==='playoff'?plPts:total;
      const row=el('div',{cls:'lb-row'+(u===S.user.username?' me':'')},
        el('span',{cls:'rank-icon'},icon),
        el('div',{cls:'avatar'},u.slice(0,2).toUpperCase()),
        el('span',{cls:'uname'},u+(u===S.user.username?' (vos)':'')),
        el('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'2px'}},
          el('span',{cls:'pts'},mainPts+' pts'),
          el('span',{style:{fontSize:'10px',color:'#3d5a7a'}},
            sortBy==='total'?'G:'+gPts+' PO:'+plPts+' E:'+spPts:
            sortBy==='grupos'?'PO:'+plPts+' E:'+spPts+' T:'+total:
            'G:'+gPts+' E:'+spPts+' T:'+total
          )
        )
      );
      listEl.appendChild(row);
    });
  }
  buildRows();
  return div;
}

        S.allUsers[u]={...userData,password:np};
        passDisplay.querySelector('span').textContent=np;
        newPassInp.value='';
        savePassBtn.disabled=false;savePassBtn.textContent='✓ Guardado';
        setTimeout(()=>savePassBtn.textContent='Guardar',2000);
      };
      newPassRow.appendChild(newPassInp);
      newPassRow.appendChild(savePassBtn);
      passPanel.appendChild(newPassRow);
      row.appendChild(passPanel);

      let open=false;
      passBtn.onclick=()=>{
        open=!open;
        passPanel.style.display=open?'block':'none';
        passBtn.textContent=open?'✕ Cerrar':'🔑 Pass';
      };

      delBtn.onclick=async()=>{
        if(!confirm('¿Eliminar a "'+u+'" y sus predicciones?'))return;
        delBtn.disabled=true;
        await fbDelUser(u);
        delete S.allUsers[u];delete S.allPicks[u];
        buildUsers();
      };

      uCont.appendChild(row);
    });
  }
  buildUsers();
  div.appendChild(uCont);
  return div;
}

renderApp();
</script>
</body>
</html>
